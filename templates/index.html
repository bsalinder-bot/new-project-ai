<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SYMBIOTIC PLANETARY INTELLIGENCE</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main>
      <h1>SYMBIOTIC PLANETARY INTELLIGENCE (SPI)</h1>
      <p>Submit JSON to the `/predict` endpoint. Use the text fallback for demonstration or send biosignal channels for SPI inference.</p>
      <textarea id="inputText" placeholder='Enter JSON: {"text":"I need help"}'></textarea>
      <button id="submitButton">Send to SPI</button>
      <section id="output" class="hidden">
        <h2>Response</h2>
        <pre id="response"></pre>
      </section>
    </main>

    <script>
      const button = document.getElementById('submitButton');
      const output = document.getElementById('output');

      button.addEventListener('click', async () => {
        const raw = document.getElementById('inputText').value.trim();
        if (!raw) {
          alert('Please enter JSON before submitting.');
          return;
        }

        let payload;
        try {
          payload = JSON.parse(raw);
        } catch (err) {
          alert('Invalid JSON. Enter a valid JSON payload.');
          return;
        }

        const response = await fetch('/predict', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();
        document.getElementById('response').textContent = JSON.stringify(data, null, 2);
        output.classList.remove('hidden');
      });
    </script>
  </body>
</html>
