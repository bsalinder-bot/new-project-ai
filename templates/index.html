<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Simple AI Demo</title>
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body>
    <main>
      <h1>Simple AI Intent Demo</h1>
      <p>Enter a sentence and the app will predict the user intent.</p>
      <textarea id="inputText" placeholder="Type something like 'I need help'..."></textarea>
      <button id="submitButton">Predict Intent</button>
      <section id="output" class="hidden">
        <h2>Prediction</h2>
        <div><strong>Intent:</strong> <span id="intent"></span></div>
        <div><strong>Confidence:</strong> <span id="confidence"></span></div>
        <div><strong>Tokens:</strong> <span id="tokens"></span></div>
        <div><strong>Message:</strong> <span id="message"></span></div>
      </section>
    </main>

    <script>
      const button = document.getElementById('submitButton');
      const output = document.getElementById('output');

      button.addEventListener('click', async () => {
        const text = document.getElementById('inputText').value.trim();
        if (!text) {
          alert('Please enter a sentence first.');
          return;
        }

        const response = await fetch('/predict', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ text })
        });

        const data = await response.json();
        document.getElementById('intent').textContent = data.intent;
        document.getElementById('confidence').textContent = data.confidence;
        document.getElementById('tokens').textContent = data.tokens.join(', ');
        document.getElementById('message').textContent = data.message;
        output.classList.remove('hidden');
      });
    </script>
  </body>
</html>
