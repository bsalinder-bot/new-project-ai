apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spi-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - spi.example.com
      secretName: spi-tls
  rules:
    - host: spi.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spi-service
                port:
                  number: 80
