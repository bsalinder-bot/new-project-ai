apiVersion: apps/v1
kind: Deployment
metadata:
  name: spi-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spi
  template:
    metadata:
      labels:
        app: spi
    spec:
      containers:
        - name: spi
          image: ghcr.io/bsalinder-bot/new-project-ai:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          readinessProbe:
            httpGet:
              path: /metrics
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 30
